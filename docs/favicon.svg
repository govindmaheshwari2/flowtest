<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark background rounded square -->
  <rect width="32" height="32" rx="7" fill="#06090f"/>
  <!-- Flow arrow mark: horizontal line + chevron pointing right -->
  <!-- Horizontal line -->
  <line x1="5" y1="16" x2="19" y2="16" stroke="#00e5a0" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Chevron / arrow head -->
  <polyline points="15,10 22,16 15,22" stroke="#00e5a0" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Small dot accent at start -->
  <circle cx="5" cy="16" r="1.5" fill="#00e5a0"/>
</svg>
