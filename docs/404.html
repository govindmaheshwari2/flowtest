<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — FlowTest</title>
<meta name="description" content="The page you're looking for doesn't exist. Head back to FlowTest.">
<meta name="robots" content="noindex, follow">
<link rel="canonical" href="https://govindmaheshwari2.github.io/flowtest/">
<meta http-equiv="refresh" content="5;url=/flowtest/">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #06090f;
    --accent: #00e5a0;
    --text: #e4e8f1;
    --muted: #7a8599;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }
  .code { font-family: var(--mono); font-size: 80px; font-weight: 700; color: var(--accent); line-height: 1; margin-bottom: 24px; }
  h1 { font-family: var(--mono); font-size: 24px; font-weight: 700; margin-bottom: 12px; }
  p { color: var(--muted); font-size: 16px; line-height: 1.7; margin-bottom: 32px; }
  a {
    display: inline-block;
    padding: 12px 28px;
    background: var(--accent);
    color: var(--bg);
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 600;
    border-radius: 8px;
    text-decoration: none;
  }
  a:hover { opacity: 0.9; }
</style>
</head>
<body>
  <div>
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>This page doesn't exist.<br>Redirecting you to the homepage in 5 seconds.</p>
    <a href="/flowtest/">Go to FlowTest</a>
  </div>
</body>
</html>
